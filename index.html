<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M365 License Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

<div class="max-w-6xl mx-auto py-10 px-5">
    <h1 class="text-3xl font-bold text-blue-600 mb-2">M365 License Finder</h1>
    <p class="text-gray-600 mb-8">Select the features you need, and we will find the optimal plan considering license hierarchy.</p>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-md border border-gray-100">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">1. Select Required Services</h2>
            <div id="loading-message" class="text-blue-600 font-medium py-4">Loading database...</div>
            <div id="error-message" class="text-red-600 font-medium py-4 hidden"></div>
            
            <div id="categories-container" class="space-y-6 hidden">
                </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md border border-gray-100 h-fit sticky top-5">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">2. Calculator</h2>
            
            <label class="block text-sm font-medium text-gray-700 mb-1">Number of users (Seats):</label>
            <input type="number" id="seats-input" value="10" min="1" class="w-full border border-gray-300 rounded-md p-2 mb-6 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">

            <h3 class="text-lg font-semibold text-gray-800 mb-3">Suitable Plans:</h3>
            <div id="results-area" class="space-y-4">
                <p class="text-sm text-gray-500 italic bg-gray-50 p-3 rounded border border-dashed border-gray-300">Select features on the left to see matching plans.</p>
            </div>
        </div>
    </div>
</div>

<script>
    let plansData = [];
    let featureMeta = {};
    let selectedFeatures = [];

    const categoriesContainer = document.getElementById('categories-container');
    const loadingMessage = document.getElementById('loading-message');
    const errorMessage = document.getElementById('error-message');
    const seatsInput = document.getElementById('seats-input');
    const resultsArea = document.getElementById('results-area');

    async function loadData() {
        try {
            // Anti-cache technique to force fresh JSON load
            const cacheBuster = new Date().getTime();
            const response = await fetch(`data.json?v=${cacheBuster}`);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const data = await response.json();
            
            if (!data.plans || !data.featureMeta) {
                throw new Error('Invalid JSON structure. Missing "plans" or "featureMeta" arrays.');
            }

            plansData = data.plans;
            featureMeta = data.featureMeta;
            
            loadingMessage.classList.add('hidden');
            categoriesContainer.classList.remove('hidden');
            
            renderCategories();
        } catch (error) {
            console.error("Loading error:", error);
            loadingMessage.classList.add('hidden');
            errorMessage.classList.remove('hidden');
            errorMessage.innerHTML = `Error loading data: ${error.message}<br><span class="text-sm font-normal text-gray-600">Please check your data.json file format.</span>`;
        }
    }

    function renderCategories() {
        const categories = {};
        
        Object.keys(featureMeta).forEach(featureName => {
            const cat = featureMeta[featureName].category || "Other";
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(featureName);
        });

        for (const [categoryName, features] of Object.entries(categories)) {
            const block = document.createElement('div');
            block.className = "bg-gray-50 p-5 rounded-lg border border-gray-200";
            
            const title = document.createElement('h3');
            title.className = "font-bold text-gray-800 mb-4 border-b border-gray-200 pb-2 text-lg";
            title.innerText = categoryName;
            block.appendChild(title);

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 md:grid-cols-2 gap-3";

            features.sort().forEach(feature => {
                const label = document.createElement('label');
                label.className = "flex items-start space-x-3 cursor-pointer p-3 bg-white hover:bg-blue-50 rounded-md transition-colors border border-gray-100 shadow-sm feature-label";
                
                const checkbox = document.createElement('input');
                checkbox.type = "checkbox";
                checkbox.value = feature;
                checkbox.className = "form-checkbox h-5 w-5 text-blue-600 rounded border-gray-300 mt-0.5 focus:ring-blue-500 feature-checkbox flex-shrink-0 cursor-pointer";
                
                checkbox.addEventListener('change', (e) => {
                    handleSelection(e.target.value, e.target.checked);
                });

                const textContainer = document.createElement('div');
                textContainer.className = "flex flex-col";
                
                const spanMain = document.createElement('span');
                spanMain.className = "text-gray-800 text-sm font-bold leading-tight";
                spanMain.innerText = feature;
                textContainer.appendChild(spanMain);
                
                if (featureMeta[feature].description) {
                    const spanDesc = document.createElement('span');
                    spanDesc.className = "text-xs text-gray-500 mt-1 leading-snug";
                    spanDesc.innerText = featureMeta[feature].description;
                    textContainer.appendChild(spanDesc);
                }
                
                const spanSub = document.createElement('span');
                spanSub.className = "text-xs font-semibold text-blue-600 mt-1 hidden included-hint";
                spanSub.innerText = "Included in higher-tier plan";
                textContainer.appendChild(spanSub);

                label.appendChild(checkbox);
                label.appendChild(textContainer);
                grid.appendChild(label);
            });

            block.appendChild(grid);
            categoriesContainer.appendChild(block);
        }
    }

    function handleSelection(featureValue, isChecked) {
        if (isChecked) {
            if (!selectedFeatures.includes(featureValue)) {
                selectedFeatures.push(featureValue);
            }
        } else {
            selectedFeatures = selectedFeatures.filter(f => f !== featureValue);
        }
        
        updateLocks();
        calculatePlans();
    }

    function updateLocks() {
        // Unlock all first
        document.querySelectorAll('.feature-checkbox').forEach(cb => {
            cb.disabled = false;
            const label = cb.closest('label');
            label.classList.remove('opacity-60', 'bg-gray-100', 'cursor-not-allowed');
            label.classList.add('cursor-pointer', 'bg-white');
            label.querySelector('.included-hint').classList.add('hidden');
        });

        let lockedFeatures = new Set();
        selectedFeatures.forEach(sf => {
            if (featureMeta[sf] && featureMeta[sf].includes) {
                featureMeta[sf].includes.forEach(inc => lockedFeatures.add(inc));
            }
        });

        // Apply locks
        lockedFeatures.forEach(lf => {
            const cb = document.querySelector(`input[value="${lf}"]`);
            if (cb) {
                cb.checked = false; 
                cb.disabled = true; 
                
                const label = cb.closest('label');
                label.classList.remove('cursor-pointer', 'bg-white', 'hover:bg-blue-50');
                label.classList.add('opacity-60', 'bg-gray-100', 'cursor-not-allowed');
                label.querySelector('.included-hint').classList.remove('hidden');
                
                selectedFeatures = selectedFeatures.filter(f => f !== lf);
            }
        });
    }

    function calculatePlans() {
        const seats = parseInt(seatsInput.value) || 0;

        if (selectedFeatures.length === 0) {
            resultsArea.innerHTML = '<p class="text-sm text-gray-500 italic bg-gray-50 p-3 rounded border border-dashed border-gray-300">Select features on the left to see matching plans.</p>';
            return;
        }

        let matchingPlans = plansData.filter(plan => {
            return selectedFeatures.every(feature => plan.features.includes(feature));
        });

        matchingPlans.sort((a, b) => a.price - b.price);
        resultsArea.innerHTML = '';

        if (matchingPlans.length === 0) {
            resultsArea.innerHTML = `
                <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded shadow-sm">
                    <p class="text-sm text-red-700 font-bold">No single plan includes all selected features.</p>
                    <p class="text-xs text-red-600 mt-1">Consider combining plans or purchasing Add-ons separately.</p>
                </div>`;
            return;
        }

        matchingPlans.forEach((plan, index) => {
            const monthlyTotal = (plan.price * seats).toFixed(2);
            const annualTotal = (plan.price * seats * 12).toFixed(2);
            const isBestValue = index === 0; 
            const borderClass = isBestValue ? 'border-blue-500 bg-blue-50' : 'border-gray-200 bg-gray-50';
            const badge = isBestValue ? '<span class="bg-blue-600 text-white text-[10px] font-bold px-2 py-1 rounded ml-2 uppercase tracking-wider shadow-sm">Best Value</span>' : '';

            const planCard = document.createElement('div');
            planCard.className = `border-2 p-4 rounded-lg ${borderClass} shadow-sm transition-all`;
            planCard.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <h4 class="font-bold text-gray-900 text-lg flex items-center">${plan.name} ${badge}</h4>
                </div>
                <div class="text-sm text-gray-600 mb-3 font-medium">Price per user: $${plan.price.toFixed(2)}/mo</div>
                <div class="bg-white p-3 rounded border border-gray-200 shadow-inner">
                    <div class="flex justify-between items-center text-sm mb-2">
                        <span class="text-gray-500">Monthly total (${seats} seats):</span>
                        <span class="font-bold text-blue-700 text-base">$${monthlyTotal}</span>
                    </div>
                    <div class="flex justify-between items-center text-sm border-t border-gray-100 pt-2">
                        <span class="text-gray-500">Annual total:</span>
                        <span class="font-bold text-gray-800">$${annualTotal}</span>
                    </div>
                </div>
            `;
            resultsArea.appendChild(planCard);
        });
    }

    seatsInput.addEventListener('input', calculatePlans);
    
    // Start the process
    loadData();
</script>

</body>
</html>
