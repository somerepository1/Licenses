<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M365 Defender & License Advisor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="logo">D</div>
    <span class="header-title">M365 Defender & License Advisor</span>
    <div class="header-pill">Decision Support</div>
</header>

<div class="layout">
    <div class="left">
        <div class="step-label">Step 1 — Select Defender Protection Vectors</div>
        <div id="defender-cats"></div>
    </div>
    
    <div class="right">
        <div class="step-label">Step 2 — Configuration & Estimation</div>
        <div class="card">
            <div class="card-head">👥 Organization Size</div>
            <div class="card-body">
                <input type="number" id="seats" value="50" min="1" class="seats-field">
                <div class="seats-label">Users in scope</div>
                <div id="seats-warn" class="seats-alert">⚠ Business plans are capped at 300 users. Switching to Enterprise only.</div>
            </div>
        </div>
        <div id="results">
            </div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/engine.js"></script>
</body>
</html>
